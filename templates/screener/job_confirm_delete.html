<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecruitAI — Delete Job</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#020408;--glow1:#00f5d4;--rose:#ff4d7e;--text:#d4f0ec;--dim:#4a7a72;--border:rgba(0,245,212,0.1);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--ink);color:var(--text);font-family:'Cabinet Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;cursor:none;}
.co{position:fixed;width:32px;height:32px;border:1.5px solid var(--glow1);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .25s,height .25s;mix-blend-mode:screen;}
.ci{position:fixed;width:5px;height:5px;background:var(--glow1);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--glow1);}
.sea-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(255,77,126,.04) 0%,var(--ink) 60%);}
.card{position:relative;z-index:10;background:rgba(255,77,126,.03);border:1px solid rgba(255,77,126,.25);padding:3rem;max-width:440px;width:100%;text-align:center;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--rose),transparent);opacity:.7;}
.warn-icon{font-size:3rem;margin-bottom:1.5rem;filter:drop-shadow(0 0 15px rgba(255,77,126,.5));}
.title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.06em;color:var(--rose);margin-bottom:.75rem;}
.sub{font-size:.85rem;color:var(--dim);margin-bottom:.5rem;}
.job-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.04em;color:#fff;margin-bottom:.5rem;}
.warning{font-size:.75rem;color:rgba(255,77,126,.6);margin-bottom:2rem;}
.btns{display:flex;gap:.75rem;justify-content:center;}
.btn-del{padding:.8rem 2rem;background:transparent;border:1.5px solid var(--rose);color:var(--rose);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.12em;cursor:none;position:relative;overflow:hidden;transition:all .3s;}
.btn-del::before{content:'';position:absolute;inset:0;background:var(--rose);transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);}
.btn-del span{position:relative;z-index:1;transition:color .3s;}
.btn-del:hover span{color:var(--ink);}
.btn-del:hover::before{transform:translateY(0);}
.btn-cancel{padding:.8rem 1.5rem;background:transparent;border:1px solid var(--border);color:var(--dim);text-decoration:none;font-size:.85rem;transition:all .2s;}
.btn-cancel:hover{color:var(--text);}
</style>
</head>
<body>
<div class="co" id="co"></div><div class="ci" id="ci"></div>
<div class="sea-bg"></div>
<div class="card">
  <div class="warn-icon">⚠️</div>
  <div class="title">Delete Job?</div>
  <div class="sub">You are about to permanently delete:</div>
  <div class="job-name">{{ job.title }}</div>
  <div class="warning">This will also delete all {{ job.candidate_count }} candidate records. This cannot be undone.</div>
  <div class="btns">
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn-del"><span>Yes, Delete</span></button>
    </form>
    <a href="/jobs/" class="btn-cancel">Cancel</a>
  </div>
</div>
<script>
const co=document.getElementById('co'),ci=document.getElementById('ci');let mx=-200,my=-200,ox=-200,oy=-200;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;ci.style.left=mx+'px';ci.style.top=my+'px';});
(function loop(){ox+=(mx-ox)*.12;oy+=(my-oy)*.12;co.style.left=ox+'px';co.style.top=oy+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>{co.style.width='50px';co.style.height='50px';co.style.borderColor='var(--rose)';});el.addEventListener('mouseleave',()=>{co.style.width='32px';co.style.height='32px';co.style.borderColor='var(--glow1)';});});
</script>
</body>
</html>
