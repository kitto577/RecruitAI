<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecruitAI — Apply</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cabinet+Grotesk:wght@400;500;700;800&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
<style>
:root{--ink:#020408;--glow1:#00f5d4;--glow2:#00c9a7;--bio1:#7affde;--rose:#ff4d7e;--text:#d4f0ec;--dim:#4a7a72;--dimmer:#2a4a44;--border:rgba(0,245,212,0.1);--border2:rgba(0,245,212,0.25);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--ink);color:var(--text);font-family:'Cabinet Grotesk',sans-serif;min-height:100vh;cursor:none;}
.co{position:fixed;width:32px;height:32px;border:1.5px solid var(--glow1);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .25s,height .25s;}
.ci{position:fixed;width:5px;height:5px;background:var(--glow1);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--glow1);}
.sea-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 70% 20%,rgba(0,245,212,.08) 0%,transparent 60%),var(--ink);}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,245,212,.012) 3px,rgba(0,245,212,.012) 4px);}

nav{position:sticky;top:0;z-index:50;background:rgba(2,4,8,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:.9rem 3rem;display:flex;align-items:center;gap:1.5rem;}
.nav-brand{display:flex;align-items:center;gap:.75rem;text-decoration:none;}
.nav-name{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;color:var(--glow1);text-shadow:0 0 30px rgba(0,245,212,.6);}
.nav-r{margin-left:auto;}
.btn-back{padding:.4rem .9rem;font-size:.75rem;font-weight:700;cursor:none;border:1px solid var(--border);text-decoration:none;color:var(--dim);background:transparent;transition:all .25s;font-family:'Cabinet Grotesk',sans-serif;}
.btn-back:hover{color:var(--text);border-color:var(--border2);}

.page{position:relative;z-index:5;max-width:620px;margin:0 auto;padding:4rem 2rem 6rem;}
.section-tag{font-size:.65rem;font-weight:700;color:var(--glow1);letter-spacing:.2em;text-transform:uppercase;display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;}
.section-tag::before{content:'';width:28px;height:1.5px;background:var(--glow1);}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:.04em;color:#fff;margin-bottom:.5rem;line-height:1;}
.job-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--glow1);letter-spacing:.06em;margin-bottom:2rem;}

.card{background:rgba(0,245,212,.02);border:1px solid var(--border);padding:2.5rem;}
.field{margin-bottom:1.5rem;}
.field label{display:block;font-size:.65rem;font-weight:700;color:var(--dim);letter-spacing:.18em;text-transform:uppercase;margin-bottom:.6rem;}
.field input{width:100%;background:rgba(0,245,212,.03);border:1px solid var(--border);padding:.85rem 1rem;color:var(--text);font-family:'Cabinet Grotesk',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--glow2);}
.field input::placeholder{color:var(--dimmer);}
.field input[type=file]{padding:.7rem 1rem;color:var(--dim);cursor:pointer;}
.field input[type=file]::file-selector-button{background:transparent;border:1px solid var(--border2);color:var(--glow1);padding:.3rem .8rem;font-family:'Cabinet Grotesk',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;margin-right:1rem;transition:all .2s;}
.field input[type=file]::file-selector-button:hover{background:rgba(0,245,212,.08);}

.submit-btn{width:100%;padding:1.1rem;background:transparent;border:1.5px solid var(--glow1);color:var(--glow1);font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.15em;cursor:none;position:relative;overflow:hidden;transition:all .3s;margin-top:.5rem;}
.submit-btn::before{content:'';position:absolute;inset:0;background:var(--glow1);transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);}
.submit-btn span{position:relative;z-index:1;transition:color .3s;}
.submit-btn:hover span{color:var(--ink);}
.submit-btn:hover::before{transform:translateY(0);}

.hint{font-size:.75rem;color:var(--dimmer);margin-top:.4rem;}
.error{background:rgba(255,77,126,.06);border:1px solid rgba(255,77,126,.2);padding:1rem;margin-bottom:1.5rem;font-size:.82rem;color:var(--rose);}
</style>
</head>
<body>
<div class="co" id="co"></div>
<div class="ci" id="ci"></div>
<div class="sea-bg"></div>
<div class="scanlines"></div>

<nav>
  <a href="/portal/" class="nav-brand">
    <span class="nav-name">RecruitAI</span>
  </a>
  <div class="nav-r">
    <a href="/portal/" class="btn-back">← Back to Jobs</a>
  </div>
</nav>

<div class="page">
  <div class="section-tag">Application</div>
  <h1 class="page-title">Apply Now</h1>
  <div class="job-name">{{ job.title }}</div>

  {% if messages %}
    {% for msg in messages %}
    <div class="error">{{ msg }}</div>
    {% endfor %}
  {% endif %}

  <div class="card">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <input type="hidden" name="job_id" value="{{ job.id }}">

      <div class="field">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your full name" required value="{{ request.user.get_full_name|default:request.user.username }}">
      </div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" value="{{ request.user.email }}">
      </div>

      <div class="field">
        <label>Resume File</label>
        <input type="file" name="resume_file" accept=".pdf,.docx,.doc,.txt" required>
        <div class="hint">Accepted formats: PDF, DOCX, DOC, TXT</div>
      </div>

      <button type="submit" class="submit-btn"><span>Submit Application →</span></button>
    </form>
  </div>
</div>

<script>
const co=document.getElementById('co'),ci=document.getElementById('ci');
let mx=-200,my=-200,ox=-200,oy=-200;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;ci.style.left=mx+'px';ci.style.top=my+'px';});
(function loop(){ox+=(mx-ox)*.12;oy+=(my-oy)*.12;co.style.left=ox+'px';co.style.top=oy+'px';requestAnimationFrame(loop);})();
</script>
</body>
</html>
